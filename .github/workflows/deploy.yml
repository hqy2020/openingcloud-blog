name: build-and-deploy

on:
  push:
    branches: [main]
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            infra:
              - 'docker-compose*.yml'
              - 'nginx/**'
              - '.github/workflows/**'

  backend-check:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python manage.py migrate --noinput
          python manage.py test
          python manage.py verify_admin_capabilities
          python manage.py security_baseline_check --allow-http-temporary

  frontend-build:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify prerender artifacts
        run: |
          test -f dist/index.html
          test -f dist/tech/index.html
          test -f dist/learning/index.html
          test -f dist/life/index.html
          grep -q "Keyon Blog" dist/index.html
          grep -q "技术" dist/tech/index.html
          grep -q "效率" dist/learning/index.html
          grep -q "生活" dist/life/index.html

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  publish-backend-image:
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.infra == 'true') &&
      needs.backend-check.result == 'success'
    needs: [changes, backend-check]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/openingclouds-backend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/openingclouds-backend:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/openingclouds-backend:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/openingclouds-backend:buildcache,mode=max

  deploy-ecs:
    if: |
      always() &&
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      (needs.frontend-build.result == 'success' || needs.publish-backend-image.result == 'success') &&
      needs.frontend-build.result != 'failure' &&
      needs.publish-backend-image.result != 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [changes, frontend-build, publish-backend-image]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifact
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy to ECS
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_USER: ${{ secrets.ECS_USER }}
          ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
          BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/openingclouds-backend:${{ github.sha }}
          BACKEND_CHANGED: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.infra == 'true' }}
          FRONTEND_CHANGED: ${{ needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true' }}
          INFRA_CHANGED: ${{ needs.changes.outputs.infra }}
        run: |
          set -euo pipefail

          if [ -z "$ECS_HOST" ] || [ -z "$ECS_USER" ] || [ -z "$ECS_SSH_KEY" ]; then
            echo "Deployment skipped (missing ECS secrets)."
            exit 0
          fi

          echo "Change summary: backend=$BACKEND_CHANGED frontend=$FRONTEND_CHANGED infra=$INFRA_CHANGED"

          mkdir -p ~/.ssh
          echo "$ECS_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          ssh-keygen -R "$ECS_HOST" >/dev/null 2>&1 || true

          SSH_OPTS=(
            -o BatchMode=yes
            -o ConnectTimeout=10
            -o ConnectionAttempts=1
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=3
            -o TCPKeepAlive=yes
            -o StrictHostKeyChecking=yes
          )

          retry() {
            local attempts="$1"
            shift
            local n=1
            local exit_code=0

            while [ "$n" -le "$attempts" ]; do
              echo "Attempt $n/$attempts: $*"
              "$@" && return 0
              exit_code=$?
              if [ "$n" -lt "$attempts" ]; then
                local delay=$((n * 5))
                echo "Command failed with exit code $exit_code, retrying in ${delay}s..."
                sleep "$delay"
              fi
              n=$((n + 1))
            done

            echo "Command failed after $attempts attempts."
            return "$exit_code"
          }

          retry 3 ssh-keyscan -T 10 -H "$ECS_HOST" >> ~/.ssh/known_hosts

          # Fast path: frontend-only → rsync just dist, skip docker work
          if [ "$BACKEND_CHANGED" = "false" ] && [ "$FRONTEND_CHANGED" = "true" ]; then
            echo "=== Fast path: frontend-only deploy ==="
            retry 3 timeout --signal=TERM --kill-after=10s 120 \
            rsync -az --delete --timeout=30 \
              -e "ssh ${SSH_OPTS[*]}" \
              ./frontend/dist/ "${ECS_USER}@${ECS_HOST}:/opt/openingclouds-blog/frontend/dist/"
            retry 8 curl --fail --silent --show-error --max-time 20 https://blog.openingclouds.xyz/api/health >/dev/null
            echo "Frontend deploy done."
            exit 0
          fi

          # Full path: backend or infra changed
          echo "=== Full path: backend/infra deploy ==="
          retry 3 timeout --signal=TERM --kill-after=10s 180 \
          rsync -az --delete --timeout=30 \
            -e "ssh ${SSH_OPTS[*]}" \
            --exclude ".git" \
            --exclude "backend/.venv" \
            --exclude "data/" \
            --exclude "certbot/conf" \
            --exclude "certbot/www" \
            --exclude "backend/db.sqlite3" \
            --exclude "*.sqlite3" \
            --exclude "*.sqlite3-*" \
            ./ "${ECS_USER}@${ECS_HOST}:/opt/openingclouds-blog/"

          run_remote_deploy() {
            timeout --signal=TERM --kill-after=15s 420 \
            ssh "${SSH_OPTS[@]}" "${ECS_USER}@${ECS_HOST}" "BACKEND_IMAGE='${BACKEND_IMAGE}' bash -se" << 'DEPLOY'
              set -euo pipefail
              cd /opt/openingclouds-blog
              COMPOSE_ARGS=(-f docker-compose.yml -f docker-compose.https.yml)
              export NGINX_CONF_FILE=./nginx/nginx.https.conf
              if [ -f data/blog.sqlite3 ]; then
                mkdir -p data/backups
                TS="$(date +%Y%m%d_%H%M%S)"
                if command -v sqlite3 >/dev/null 2>&1; then
                  sqlite3 data/blog.sqlite3 ".backup data/backups/blog.deploy_${TS}.sqlite3"
                else
                  cp data/blog.sqlite3 "data/backups/blog.deploy_${TS}.sqlite3"
                fi
              fi
              docker compose "${COMPOSE_ARGS[@]}" pull backend || true
              docker compose "${COMPOSE_ARGS[@]}" up -d --remove-orphans
              docker compose "${COMPOSE_ARGS[@]}" ps --status running --services | grep -qx backend
              docker compose "${COMPOSE_ARGS[@]}" ps --status running --services | grep -qx nginx
              docker compose "${COMPOSE_ARGS[@]}" ps --status running --services | grep -qx certbot
              ss -ltn | grep -q ':443 '
          DEPLOY
          }

          retry 3 run_remote_deploy
          retry 8 curl --fail --silent --show-error --max-time 20 https://blog.openingclouds.xyz/api/health >/dev/null
