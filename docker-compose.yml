services:
  backend:
    image: ${BACKEND_IMAGE:-openingclouds-backend:local}
    build:
      context: ./backend
    container_name: openingclouds-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    volumes:
      - ./data:/app/data
      - staticfiles:/app/staticfiles
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; req = urllib.request.Request('http://localhost:8000/api/health', headers={'X-Forwarded-Proto': 'https'}); urllib.request.urlopen(req)\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  knowledge-sync:
    image: ${BACKEND_IMAGE:-openingclouds-backend:local}
    container_name: openingclouds-knowledge-sync
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./data:/app/data
    depends_on:
      backend:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "[knowledge-sync] scheduler started, daily at 04:00 Asia/Shanghai"
        LAST_RUN=""
        while :; do
          TODAY=$$(date +%Y-%m-%d)
          HM=$$(date +%H%M)
          if [ "$$HM" = "0400" ] && [ "$$LAST_RUN" != "$$TODAY" ]; then
            echo "[$$(date)] running sync_knowledge_github + sync_quotes_from_wiki"
            if python manage.py sync_knowledge_github && python manage.py sync_quotes_from_wiki; then
              LAST_RUN=$$TODAY
            else
              echo "[$$(date)] sync failed, will retry next minute"
            fi
          fi
          sleep 45
        done

  nginx:
    image: nginx:1.27-alpine
    container_name: openingclouds-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ${NGINX_CONF_FILE:-./nginx/nginx.conf}:/etc/nginx/nginx.conf:ro
      - staticfiles:/usr/share/nginx/static:ro
      - ./data:/usr/share/nginx/media:ro

volumes:
  staticfiles:
