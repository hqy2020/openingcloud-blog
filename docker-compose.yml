services:
  backend:
    image: ${BACKEND_IMAGE:-openingclouds-backend:local}
    build:
      context: ./backend
    container_name: openingclouds-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    volumes:
      - ./data:/app/data
      - staticfiles:/app/staticfiles
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; req = urllib.request.Request('http://localhost:8000/api/health', headers={'X-Forwarded-Proto': 'https'}); urllib.request.urlopen(req)\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    container_name: openingclouds-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ${NGINX_CONF_FILE:-./nginx/nginx.conf}:/etc/nginx/nginx.conf:ro
      - staticfiles:/usr/share/nginx/static:ro
      - ./data:/usr/share/nginx/media:ro

volumes:
  staticfiles:
