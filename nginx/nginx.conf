worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 10m;

  proxy_cache_path /tmp/nginx-api-cache
    levels=1:2
    keys_zone=api_cache:2m
    max_size=50m
    inactive=1d
    use_temp_path=off;

  upstream backend_upstream {
    server backend:8000;
  }

  server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location /api/ {
      proxy_pass http://backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # 快速失败：backend 挂了时不让 nginx 长时间挂起
      proxy_connect_timeout 3s;
      proxy_send_timeout    8s;
      proxy_read_timeout    8s;

      # API 缓存：成功响应缓存 5 分钟
      proxy_cache            api_cache;
      proxy_cache_key        "$scheme$request_method$host$request_uri";
      proxy_cache_valid      200 5m;
      proxy_cache_use_stale  error timeout http_502 http_503 http_504 updating;
      proxy_cache_lock       on;

      # 已登录用户（sessionid cookie）跳过缓存，避免脏读
      proxy_cache_bypass     $cookie_sessionid;
      proxy_no_cache         $cookie_sessionid;

      add_header X-Cache-Status $upstream_cache_status;
    }

    location = /sitemap.xml {
      proxy_pass http://backend_upstream/sitemap.xml;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
      proxy_pass http://backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # admin 不缓存，但加超时防止 nginx 挂起
      proxy_connect_timeout 3s;
      proxy_send_timeout    30s;
      proxy_read_timeout    30s;
    }

    location /static/ {
      alias /usr/share/nginx/static/;
      expires 30d;
      add_header Cache-Control "public, max-age=2592000, immutable";
      access_log off;
    }

    location /media/uploads/ {
      alias /usr/share/nginx/media/uploads/;
      expires 7d;
      add_header Cache-Control "public, max-age=604800";
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
